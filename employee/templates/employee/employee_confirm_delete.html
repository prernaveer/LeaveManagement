<!DOCTYPE html>
<html>
    {% load static %}
<head>
    <title>Delete Employee</title>
    <link rel="stylesheet" href="{% static 'employee/style.css' %}">
</head>

<h2>Delete Employee</h2>

<p>Are you sure you want to delete <b>{{ employee.name }}</b>?</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
</form>

<br>

<a href="{% url 'employee_list' %}">Cancel</a>

</body>
</html>
